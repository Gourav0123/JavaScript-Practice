<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Figma Projects - Gourav</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0b1220;
            color: #fff;
        }

        /* HEADER */
        .section-title span {
            color: #6c63ff;
            letter-spacing: 2px;
            font-size: 12px;
            text-transform: uppercase;
        }

        /* GRID */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 260px;
            gap: 20px;
        }

        .portfolio-card {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            cursor: pointer;
        }

        .portfolio-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s ease;
        }

        .portfolio-card:hover img {
            transform: scale(1.1);
        }

        /* OVERLAY */
        .portfolio-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
        }

        .portfolio-content span {
            font-size: 12px;
            color: #aaa;
        }

        .portfolio-content h5 {
            margin: 5px 0 0;
            font-weight: 600;
        }

        /* SIZES */
        .large {
            grid-column: span 2;
            grid-row: span 2;
        }

        .tall {
            grid-row: span 2;
        }

        .wide {
            grid-column: span 2;
        }

        /* BUTTON */
        .btn-outline-light {
            border-radius: 50px;
            padding: 8px 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 992px) {
            .portfolio-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .portfolio-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark bg-transparent py-3">
        <div class="container">
            <h4 class="fw-bold m-0">Gourav<span style="color:#6c63ff;">.</span></h4>
            <a href="index.html" class="btn btn-outline-light">Back</a>
        </div>
    </nav>

    <!-- PORTFOLIO SECTION -->
    <section class="py-5">
        <div class="container">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-end mb-5">
                <div class="section-title">
                    <span>MY FIGMA WORK</span>
                    <h2 class="fw-bold mt-2">Apps & Website Designs</h2>
                </div>
                <a href="#" class="btn btn-outline-light">View All</a>
            </div>

            <!-- GRID -->
            <div class="portfolio-grid">

                <div class="portfolio-card large">
                    <img src="https://images.unsplash.com/photo-1547658719-da2b51169166" alt="">
                    <div class="portfolio-content">
                        <span>App Design</span>
                        <h5>Food Delivery UI</h5>
                    </div>
                </div>

                <div class="portfolio-card">
                    <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085" alt="">
                    <div class="portfolio-content">
                        <span>Website</span>
                        <h5>Landing Page</h5>
                    </div>
                </div>

                <div class="portfolio-card tall">
                    <img src="https://images.unsplash.com/photo-1522542550221-31fd19575a2d" alt="">
                    <div class="portfolio-content">
                        <span>UI/UX</span>
                        <h5>Mobile App</h5>
                    </div>
                </div>

                <div class="portfolio-card wide">
                    <img src="https://images.unsplash.com/photo-1555421689-491a97ff2040" alt="">
                    <div class="portfolio-content">
                        <span>Portfolio</span>
                        <h5>Creative Website</h5>
                    </div>
                </div>

                <div class="portfolio-card">
                    <img src="https://images.unsplash.com/photo-1507238691740-187a5b1d37b8" alt="">
                    <div class="portfolio-content">
                        <span>Dashboard</span>
                        <h5>Admin Panel</h5>
                    </div>
                </div>

                <div class="portfolio-card">
                    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c" alt="">
                    <div class="portfolio-content">
                        <span>UI Design</span>
                        <h5>Finance App</h5>
                    </div>
                </div>

            </div>

        </div>
    </section>

</body>

</html>
