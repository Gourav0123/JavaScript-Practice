<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Gourav</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top">
        <div class="container">

            <!-- Logo -->
            <a class="navbar-brand fw-bold" href="#">Gourav</a>

            <!-- Toggle Button -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center gap-3">

                    <li class="nav-item">
                        <a class="nav-link active nav-hover" href="#home">Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-hover" href="#about">About</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-hover" href="#services">Services</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link nav-hover" href="#contact">Contact</a>
                    </li>

                    <!-- CTA Button -->
                    <li class="nav-item">
                        <a class="btn btn-primary px-4 rounded-pill" href="#contact">Hire Me</a>
                    </li>

                </ul>
            </div>

        </div>
    </nav>

    <!-- Sections -->
    <div class="container home-section" id="home" style="min-height: 100vh;">
        <div class="row align-items-center text-center text-lg-start">

            <!-- Left Content -->
            <div class="col-lg-6">
                <h1 class="fw-bold">
                    Hi, I'm <span class="text-primary fw-bold">Gourav</span>
                </h1>

                <h5 class="text-muted">
                    Creative <span class="changing-text">
                        <span>Web Designer</span>
                        <span>Developer</span>
                        <span>YouTube Creator</span>
                    </span>
                </h5>

                <p class="mt-3">
                    I create modern, responsive websites with clean UI & smooth user experience.
                </p>
            </div>

            <!-- Right Image -->
            <div class="col-lg-6 text-center">
                <div class="Person-Image">
                    <img src="assets/images/young-men.avif" class="img-fluid rounded-4" alt="person">
                </div>
            </div>

        </div>
    </div>
    <div id="about" style="height:100vh; padding:20px;">About Section</div>
    <div id="services" style="height:100vh; padding:20px;">Services Section</div>
    <div id="contact" style="height:100vh; padding:20px;">Contact Section</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>

</html>
